      <text x="55" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#F6F2E9">True</text>
      <text x="55" y="63" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#F6F2E9">Negative</text>
