<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="720" fill="#FFFFFF"/>
  <text x="600" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#1F1D1A">How a Neural Network Processes Information</text>
  <g>
    <rect x="90" y="250" width="180" height="180" rx="28" fill="#F5FBFA" stroke="#D9F3EE" stroke-width="2"/>
    <text x="180" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#114B5F">Input</text>
    <text x="180" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#665D54">Raw data enters</text>
    <text x="180" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#665D54">the network</text>
  </g>
  <g>
    <rect x="360" y="180" width="220" height="320" rx="28" fill="#F7F4FF" stroke="#E5D9FF" stroke-width="2"/>
    <text x="470" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#53389E">Hidden Layers</text>
    <circle cx="430" cy="300" r="18" fill="#7C5CFF"/>
    <circle cx="510" cy="260" r="18" fill="#7C5CFF"/>
    <circle cx="510" cy="340" r="18" fill="#7C5CFF"/>
    <circle cx="430" cy="380" r="18" fill="#7C5CFF"/>
    <circle cx="510" cy="420" r="18" fill="#7C5CFF"/>
    <line x1="430" y1="300" x2="510" y2="260" stroke="#B9A4FF" stroke-width="3"/>
    <line x1="430" y1="300" x2="510" y2="340" stroke="#B9A4FF" stroke-width="3"/>
    <line x1="430" y1="380" x2="510" y2="340" stroke="#B9A4FF" stroke-width="3"/>
    <line x1="430" y1="380" x2="510" y2="420" stroke="#B9A4FF" stroke-width="3"/>
    <text x="470" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#665D54">Patterns are learned</text>
  </g>
  <g>
    <rect x="690" y="250" width="180" height="180" rx="28" fill="#FFF7EB" stroke="#FFE0B2" stroke-width="2"/>
    <text x="780" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#B45309">Output</text>
    <text x="780" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#665D54">Prediction or</text>
    <text x="780" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#665D54">classification</text>
  </g>
  <g>
    <rect x="945" y="210" width="180" height="260" rx="28" fill="#EEF8FF" stroke="#D0E9FF" stroke-width="2"/>
    <text x="1035" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#2563EB">Feedback</text>
    <text x="1035" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#665D54">Weights update</text>
    <text x="1035" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#665D54">after each pass</text>
    <text x="1035" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#665D54">Accuracy improves</text>
    <text x="1035" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#665D54">over time</text>
  </g>
  <g stroke="#1F1D1A" stroke-width="4" stroke-linecap="round">
    <line x1="270" y1="340" x2="360" y2="340"/>
    <line x1="580" y1="340" x2="690" y2="340"/>
    <line x1="870" y1="340" x2="945" y2="340"/>
  </g>
  <g fill="#1F1D1A">
    <path d="M352 332L368 340L352 348V332Z"/>
    <path d="M682 332L698 340L682 348V332Z"/>
    <path d="M937 332L953 340L937 348V332Z"/>
  </g>
</svg>
